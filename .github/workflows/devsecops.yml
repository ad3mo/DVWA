name: DevSecOps Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# packages:write is required to push the image to GHCR after the build passes.
permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: dvwa-app
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # ─── JOB 1: SAST — Static Application Security Testing ───────────────────
  sast-scan:
    name: SAST Scan (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # OSS rules via --config; optional SEMGREP_APP_TOKEN enables Semgrep App / supply chain features.
      - name: Run Semgrep
        run: semgrep scan --error --config=p/default --config=p/owasp-top-ten --config=p/php
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ─── JOB 2: Dependency Scan ───────────────────────────────────────────────
  dependency-scan:
    name: Dependency Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ─── JOB 3: Secret Detection ──────────────────────────────────────────────
  secret-scan:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: only required for certain Gitleaks Enterprise / license scenarios.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ─── JOB 4: Docker Build + Image Scan + Push to GHCR ─────────────────────
  docker-build-scan:
    name: Docker Build + Image Scan + GHCR Push
    runs-on: ubuntu-latest
    needs: [sast-scan, dependency-scan, secret-scan]
    outputs:
      deploy_image: ${{ steps.image.outputs.deploy_image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute GHCR image coordinates
        id: image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMG="ghcr.io/${OWNER}/${{ env.IMAGE_NAME }}"
          echo "FULL_IMAGE=${IMG}" >> "$GITHUB_ENV"
          echo "deploy_image=${IMG}:${{ env.IMAGE_TAG }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t "${FULL_IMAGE}:${{ env.IMAGE_TAG }}" -t "${FULL_IMAGE}:latest" .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.FULL_IMAGE }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      # Only push on branch pushes (not fork PRs); PR workflows still build+scan above.
      - name: Push Docker image to GHCR
        if: github.event_name == 'push'
        run: |
          docker push "${FULL_IMAGE}:${{ env.IMAGE_TAG }}"
          docker push "${FULL_IMAGE}:latest"

  # Deploy pulls the image pushed in docker-build-scan. DVWA still needs MariaDB/MySQL
  # reachable from the container (set DVWA_DB_SERVER — e.g. RDS, EC2 private IP, or docker host gateway).
  # ─── JOB 5: Deploy (only after scans + push; main/master only) ─────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [docker-build-scan]
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_IMAGE: ${{ needs.docker-build-scan.outputs.deploy_image }}
          REMOTE_DB_SERVER: ${{ secrets.DVWA_DB_SERVER }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: DEPLOY_IMAGE,REMOTE_DB_SERVER
          script: |
            set -eo pipefail
            docker network inspect dvwa-net >/dev/null 2>&1 || docker network create dvwa-net
            docker pull "$DEPLOY_IMAGE"
            docker stop dvwa-running || true
            docker rm dvwa-running || true
            docker run -d \
              --name dvwa-running \
              --network dvwa-net \
              --restart unless-stopped \
              -p 80:80 \
              -e DB_SERVER="${REMOTE_DB_SERVER}" \
              "$DEPLOY_IMAGE"
